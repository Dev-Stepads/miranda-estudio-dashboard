name: Sync ETL (Nuvemshop + Conta Azul + Meta Ads)

on:
  # Roda a cada 30 minutos automaticamente
  schedule:
    - cron: '*/30 * * * *'

  # Permite rodar manualmente pelo painel do GitHub
  workflow_dispatch:

jobs:
  sync:
    name: Incremental Sync (all sources)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Sync Nuvemshop (incremental)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NUVEMSHOP_ACCESS_TOKEN: ${{ secrets.NUVEMSHOP_ACCESS_TOKEN }}
          NUVEMSHOP_STORE_ID: ${{ secrets.NUVEMSHOP_STORE_ID }}
          NUVEMSHOP_USER_AGENT: 'Miranda Dashboard (dev@stepads.com.br)'
        run: npx tsx src/etl/nuvemshop/run.ts

      - name: Sync Conta Azul (incremental)
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONTA_AZUL_CLIENT_ID: ${{ secrets.CONTA_AZUL_CLIENT_ID }}
          CONTA_AZUL_CLIENT_SECRET: ${{ secrets.CONTA_AZUL_CLIENT_SECRET }}
          # Refresh token is read from Supabase etl_config table (not from secrets).
          # The ETL writes the new rotated token back to the table after each run.
          # CONTA_AZUL_REFRESH_TOKEN env var is only used as fallback on first run.
        run: npx tsx src/etl/conta-azul/run.ts

      - name: Sync Meta Ads (incremental — upsert defensivo dos ultimos 7 dias)
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_API_VERSION: 'v25.0'
        run: npx tsx src/etl/meta-ads/run.ts
